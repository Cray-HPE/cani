inputs:
  STREAM:
    required: true
    type: string
  EXPECTED_ARCHES:
    description: "Number of distinct CPU architectures expected to publish a non-src RPM (matches the Jenkinsfile.github build matrix). The wait loop blocks until this many arches are present so a release is never published with a missing architecture."
    required: false
    # Temporarily "1" because the aarch64 RPM leg is disabled in Jenkinsfile.github.
    # Restore to "2" when the aarch64 arch is added back to that build matrix.
    default: "1"
runs:
  using: "composite"
  steps:
    - name: Prepare Artifacts
      id: prepare_artifacts
      shell: bash
      env:
          REPOSITORY: csm-rpms
          ORG: hpe
          STREAM: ${{ inputs.STREAM }}
          WAIT: 45
          EXPECTED_ARCHES: ${{ inputs.EXPECTED_ARCHES }}
          MAX_ATTEMPTS: 40
      run: |
          sudo apt-get install -y rename

          # Wait for our non-src RPM(s) to finish building and publishing.
          # Jenkinsfile.github builds one RPM per architecture (x86_64 + aarch64) on independent
          # agents, so the two arch RPMs can land in Artifactory seconds-to-minutes apart. Block
          # until EVERY expected architecture is present (not just the first one); otherwise the
          # release can be published with a missing architecture (see the v0.6.5 incident).
          echo Looking for "vcs.branch=${{ github.ref_name }};rpm.metadata.name=${GITHUB_REPOSITORY#*/}"
          attempt=0
          while true; do
           arches=$(jf rt s "${REPOSITORY}/${ORG}/${STREAM}/" --props "vcs.branch=${{ github.ref_name }};rpm.metadata.name=${GITHUB_REPOSITORY#*/}" --exclude-props "rpm.metadata.arch=src" | jq -r '[.[].props["rpm.metadata.arch"]?[]?] | unique | length')
           arches=${arches:-0}
           if [ "${arches}" -ge "${EXPECTED_ARCHES}" ]; then
             echo "Found all ${EXPECTED_ARCHES} expected architecture(s); proceeding."
             break
           fi
           attempt=$((attempt + 1))
           if [ "${attempt}" -ge "${MAX_ATTEMPTS}" ]; then
             echo "ERROR: only ${arches}/${EXPECTED_ARCHES} architecture(s) published after ${MAX_ATTEMPTS} attempts; aborting so a partial release is not created." >&2
             exit 1
           fi
           echo "Found ${arches}/${EXPECTED_ARCHES} architecture(s) so far; retrying in ${WAIT} seconds ... " >&2
           sleep ${WAIT}
          done

          # Make a workspace
          DIR_DOWNLOAD=$(mktemp -d)
          DIR_UPLOAD=$(mktemp -d)
          echo DIR_DOWNLOAD=${DIR_DOWNLOAD} >>$GITHUB_ENV
          echo DIR_UPLOAD=${DIR_UPLOAD} >>$GITHUB_ENV

          # This renaming code is clunky, and to avoid mistakes let's work on src and non-src RPMs in separate loops.
          # This effectively ensures that we provide artifacts for the distros we build for by uploading the artifacts with the distro in their name.

          # Working on non-SRC
          jf rt download "${REPOSITORY}/${ORG}/${STREAM}/" ${DIR_DOWNLOAD}/ --props "vcs.branch=${{ github.ref_name }};rpm.metadata.name=${GITHUB_REPOSITORY#*/}" --exclude-props "rpm.metadata.arch=src";
          for dir in ${DIR_DOWNLOAD}/${ORG}/${STREAM}/*; do
             os_dir=$(basename $dir)

             # trim any dashes, use a compact name.
             os=${os_dir/-/}

             # export for the -exec to work.
             export os
             find ${DIR_DOWNLOAD}/${ORG}/${STREAM}/${os_dir} -name *.rpm -exec rename -v 's/\.rpm/.'"${os}"'.rpm/' '{}' \;
          done

          # Move all the renamed RPMs into the upload dir.
          find ${DIR_DOWNLOAD}/${ORG}/${STREAM} -name *.rpm -exec mv '{}' ${DIR_UPLOAD}/ \;

          # Cleanup ... prepare to work on src RPMs.
          rm -rf ${DIR_DOWNLOAD}/${ORG}/${STREAM}/

          # Wait for our source RPMs to finish publishing.
          while ! jf rt s --fail-no-op=true "${REPOSITORY}/${ORG}/${STREAM}/" --props "vcs.branch=${{ github.ref_name }};rpm.metadata.name=${GITHUB_REPOSITORY#*/};rpm.metadata.arch=src"; do
           echo "Waiting for artifacts to be available; retrying in ${WAIT} seconds ... " >&2
           sleep ${WAIT}
          done

          # Give parallel builds a chance incase they published at slightly different times.
          sleep ${WAIT}

          # Rename src RPMs
          jf rt download "${REPOSITORY}/${ORG}/${STREAM}/" ${DIR_DOWNLOAD}/ --props "vcs.branch=${{ github.ref_name }};rpm.metadata.name=${GITHUB_REPOSITORY#*/};rpm.metadata.arch=src";
          for dir in ${DIR_DOWNLOAD}/${ORG}/${STREAM}/*; do
             os_dir=$(basename $dir)


             # trim any dashes, use a compact name.
             os=${os_dir/-/}

             # export for the -exec to work.
             export os
             find ${DIR_DOWNLOAD}/${ORG}/${STREAM}/${os_dir} -name *.rpm -exec rename -v 's/\.src\.rpm/.'"${os}"'.src.rpm/' '{}' \;
          done

          # Move all the renamed RPMs into the upload dir.
          find ${DIR_DOWNLOAD}/${ORG}/${STREAM} -name *.rpm -exec mv '{}' ${DIR_UPLOAD}/ \;

          # Display what we have done.
          ls -l ${DIR_UPLOAD}
