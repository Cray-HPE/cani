---
manufacturer: HPE
model: DL380 Gen 11
slug: hpe-dl380-gen-11
hardware-type: blade
u_height: 2
is_full_depth: true
comments: "2U Service node with Intel Xeon Sapphire Rapids CPUs"
console-ports:
  - name: Serial
    type: de-9
  - name: VGA
    type: other
module-bays:
  - name: PSU1
    position: PSU1
  - name: PSU2
    position: PSU2
  - name: FlexLOM
    position: FlexLOM
  - name: PCIe1
    position: PCIe1
  - name: PCIe2
    position: PCIe2
  - name: PCIe3
    position: PCIe3
interfaces:
  # HSN Interface - NDR InfiniBand via CX7
  - name: HSN 0
    type: 400gbase-x-qsfpdd
    label: NDR InfiniBand CX7
  # Management Interface - 100GbE CX6
  - name: MGMT 0
    type: 100gbase-x-qsfp28
    label: Management CX6
  # HPS Interfaces - 200GbE CX7
  - name: HPS 0
    type: 200gbase-x-qsfp56
    label: HPS CX7
  # Onboard NICs
  - name: Gig-E 1
    type: 1000base-t
  - name: Gig-E 2
    type: 1000base-t
  - name: Gig-E 3
    type: 1000base-t
  - name: Gig-E 4
    type: 1000base-t
  # iLO
  - name: iLO
    type: 1000base-t
    mgmt_only: true
