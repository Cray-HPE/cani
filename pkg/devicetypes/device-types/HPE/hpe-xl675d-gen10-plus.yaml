---
manufacturer: HPE
model: XL675d Gen10 Plus
slug: hpe-xl675d-gen10-plus
hardware-type: blade
u_height: 6
is_full_depth: true
comments: "6U GPU server with 8x NVIDIA H100 PCIe GPUs, AMD EPYC Milan CPUs"
console-ports:
  - name: Serial
    type: de-9
  - name: VGA
    type: other
module-bays:
  - name: PSU1
    position: PSU1
  - name: PSU2
    position: PSU2
  - name: PSU3
    position: PSU3
  - name: PSU4
    position: PSU4
  - name: GPU 0
    position: GPU0
  - name: GPU 1
    position: GPU1
  - name: GPU 2
    position: GPU2
  - name: GPU 3
    position: GPU3
  - name: GPU 4
    position: GPU4
  - name: GPU 5
    position: GPU5
  - name: GPU 6
    position: GPU6
  - name: GPU 7
    position: GPU7
interfaces:
  # HSN Interfaces - NDR InfiniBand via CX7
  - name: HSN 0
    type: 400gbase-x-qsfpdd
    label: NDR InfiniBand CX7
  - name: HSN 1
    type: 400gbase-x-qsfpdd
    label: NDR InfiniBand CX7
  - name: HSN 2
    type: 400gbase-x-qsfpdd
    label: NDR InfiniBand CX7
  - name: HSN 3
    type: 400gbase-x-qsfpdd
    label: NDR InfiniBand CX7
  # Management Interface - 25GbE Qlogic
  - name: MGMT 0
    type: 25gbase-x-sfp28
    label: Management Qlogic 41000
  # iLO
  - name: iLO
    type: 1000base-t
    mgmt_only: true
