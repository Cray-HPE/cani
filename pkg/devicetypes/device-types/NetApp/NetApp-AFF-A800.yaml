---
manufacturer: NetApp
model: AFF A800
slug: netapp-aff-a800
description: "NetApp AFF A800 single-chassis HA pair, 4U dual-controller all-flash NVMe storage system with 48 internal drive slots and 10 PCIe expansion slots. Source: https://docs.netapp.com/us-en/ontap-systems/a800/overview.html"
type: node
u_height: 4
is_full_depth: true
weight: 60.1
weight_unit: kg

console-ports:
  - name: Controller-A Serial
    type: rj-45
  - name: Controller-A USB
    type: usb-a
  - name: Controller-B Serial
    type: rj-45
  - name: Controller-B USB
    type: usb-a

power-ports:
  - name: Controller-A PSU1
    type: iec-60320-c14
    maximum_draw: 1400
    allocated_draw: 900
  - name: Controller-A PSU2
    type: iec-60320-c14
    maximum_draw: 1400
    allocated_draw: 900
  - name: Controller-B PSU1
    type: iec-60320-c14
    maximum_draw: 1400
    allocated_draw: 900
  - name: Controller-B PSU2
    type: iec-60320-c14
    maximum_draw: 1400
    allocated_draw: 900

module-bays:
  - name: Controller-A Slot 1
    position: A-Slot1
  - name: Controller-A Slot 2
    position: A-Slot2
  - name: Controller-A Slot 3
    position: A-Slot3
  - name: Controller-A Slot 4
    position: A-Slot4
  - name: Controller-A Slot 5
    position: A-Slot5
  - name: Controller-B Slot 1
    position: B-Slot1
  - name: Controller-B Slot 2
    position: B-Slot2
  - name: Controller-B Slot 3
    position: B-Slot3
  - name: Controller-B Slot 4
    position: B-Slot4
  - name: Controller-B Slot 5
    position: B-Slot5

interfaces:
  # Controller-A management
  - name: Controller-A e0M
    type: 1000base-t
    mgmt_only: true
  - name: Controller-A SP
    type: 1000base-t
    mgmt_only: true
    label: Service Processor / BMC
  # Controller-A onboard 100GbE QSFP28 (cluster/HA interconnect)
  - name: Controller-A e0a
    type: 100gbase-x-qsfp28
    label: Cluster/HA Interconnect
  - name: Controller-A e0b
    type: 100gbase-x-qsfp28
    label: Cluster/HA Interconnect
  # Controller-B management
  - name: Controller-B e0M
    type: 1000base-t
    mgmt_only: true
  - name: Controller-B SP
    type: 1000base-t
    mgmt_only: true
    label: Service Processor / BMC
  # Controller-B onboard 100GbE QSFP28 (cluster/HA interconnect)
  - name: Controller-B e0a
    type: 100gbase-x-qsfp28
    label: Cluster/HA Interconnect
  - name: Controller-B e0b
    type: 100gbase-x-qsfp28
    label: Cluster/HA Interconnect
