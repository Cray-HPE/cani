---
manufacturer: NetApp
model: FAS8300
slug: netapp-fas8300
description: "NetApp FAS8300 single-chassis HA pair, 4U dual-controller hybrid flash storage system with 14 PCIe expansion slots. Source: https://docs.netapp.com/us-en/ontap-systems/fas8300/fas8300-key-specifications.html"
type: node
u_height: 4
is_full_depth: true
weight: 49.2
weight_unit: kg

console-ports:
  - name: Controller-A Serial
    type: rj-45
  - name: Controller-A USB
    type: usb-a
  - name: Controller-B Serial
    type: rj-45
  - name: Controller-B USB
    type: usb-a

power-ports:
  - name: Controller-A PSU1
    type: iec-60320-c14
    maximum_draw: 1100
    allocated_draw: 700
  - name: Controller-A PSU2
    type: iec-60320-c14
    maximum_draw: 1100
    allocated_draw: 700
  - name: Controller-B PSU1
    type: iec-60320-c14
    maximum_draw: 1100
    allocated_draw: 700
  - name: Controller-B PSU2
    type: iec-60320-c14
    maximum_draw: 1100
    allocated_draw: 700

module-bays:
  - name: Controller-A Slot 1
    position: A-Slot1
  - name: Controller-A Slot 2
    position: A-Slot2
  - name: Controller-A Slot 3
    position: A-Slot3
  - name: Controller-A Slot 4
    position: A-Slot4
  - name: Controller-A Slot 5
    position: A-Slot5
  - name: Controller-A Slot 6
    position: A-Slot6
  - name: Controller-A Slot 7
    position: A-Slot7
  - name: Controller-B Slot 1
    position: B-Slot1
  - name: Controller-B Slot 2
    position: B-Slot2
  - name: Controller-B Slot 3
    position: B-Slot3
  - name: Controller-B Slot 4
    position: B-Slot4
  - name: Controller-B Slot 5
    position: B-Slot5
  - name: Controller-B Slot 6
    position: B-Slot6
  - name: Controller-B Slot 7
    position: B-Slot7

interfaces:
  # Controller-A management
  - name: Controller-A e0M
    type: 1000base-t
    mgmt_only: true
  # Controller-A onboard 100GbE QSFP28 (cluster/HA/data)
  - name: Controller-A e0e
    type: 100gbase-x-qsfp28
  - name: Controller-A e0f
    type: 100gbase-x-qsfp28
  # Controller-A onboard 25GbE SFP28 (data)
  - name: Controller-A e0a
    type: 25gbase-x-sfp28
  - name: Controller-A e0b
    type: 25gbase-x-sfp28
  - name: Controller-A e0c
    type: 25gbase-x-sfp28
  - name: Controller-A e0d
    type: 25gbase-x-sfp28
  - name: Controller-A e0g
    type: 25gbase-x-sfp28
  - name: Controller-A e0h
    type: 25gbase-x-sfp28
  # Controller-A onboard SAS 12Gbps (storage shelf connectivity)
  - name: Controller-A 0a
    type: other
    label: SAS 12Gbps
  - name: Controller-A 0b
    type: other
    label: SAS 12Gbps
  - name: Controller-A 0c
    type: other
    label: SAS 12Gbps
  - name: Controller-A 0d
    type: other
    label: SAS 12Gbps
  # Controller-B management
  - name: Controller-B e0M
    type: 1000base-t
    mgmt_only: true
  # Controller-B onboard 100GbE QSFP28 (cluster/HA/data)
  - name: Controller-B e0e
    type: 100gbase-x-qsfp28
  - name: Controller-B e0f
    type: 100gbase-x-qsfp28
  # Controller-B onboard 25GbE SFP28 (data)
  - name: Controller-B e0a
    type: 25gbase-x-sfp28
  - name: Controller-B e0b
    type: 25gbase-x-sfp28
  - name: Controller-B e0c
    type: 25gbase-x-sfp28
  - name: Controller-B e0d
    type: 25gbase-x-sfp28
  - name: Controller-B e0g
    type: 25gbase-x-sfp28
  - name: Controller-B e0h
    type: 25gbase-x-sfp28
  # Controller-B onboard SAS 12Gbps (storage shelf connectivity)
  - name: Controller-B 0a
    type: other
    label: SAS 12Gbps
  - name: Controller-B 0b
    type: other
    label: SAS 12Gbps
  - name: Controller-B 0c
    type: other
    label: SAS 12Gbps
  - name: Controller-B 0d
    type: other
    label: SAS 12Gbps
