docs_dir: docs
site_name: cani
site_description: cani documenation
site_author: Cray-HPE
# site_url:
repo_url: https://github.com/Cray-HPE/cani
edit_uri: edit/main/docs
theme: 
  name: material
  custom_dir: docs/custom_theme
  logo: custom_theme/img/HPE_logo_full-clr_rev_rgb.png
  language: en
  favicon: custom_theme/img/favicon.ico
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: cani use dark mode?
    # Palette toggle for dark mode
    - scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: cani use light mode?
# HPE branding
extra_css:
  - extra.css
# version switcher
extra:
  version:
    provider: mike
plugins:
    - search
    - awesome-pages
nav:
  - Home: index.md
  - Installation:
    - Go: install/go_install.md
    - RPM: install/rpm_install.md
  - Getting Started:
    - Importing Data: getting_started/importing.md
    - ETL Pipeline: getting_started/importing_provider_data.md
    - DCIM CSV: getting_started/dcim_csv.md
    - Adding Hardware: getting_started/adding_hardware.md
    - Updating Hardware: getting_started/updating_hardware.md
    - Classifying Devices: getting_started/classify.md
    - Resolving Orphans: getting_started/resolving_orphans.md
    - Exporting Data: getting_started/exporting.md
    - Visual Output: getting_started/export_and_import_data.md
  - Providers:
    - CSM: providers/csm.md
    - HPCM: providers/hpcm.md
    - Nautobot: providers/nautobot.md
    - Redfish: providers/redfish.md
    - Ochami: providers/ochami.md
    - Example: providers/example.md
  - Inventory Format:
    - Overview: inventory_format/overview.md
    - UUID Keys: inventory_format/uuid.md
    - Metadata: inventory_format/metadata.md
  - CRUD Ops:
    - Add: crud/create.md
    - Show: crud/read.md
    - Update: crud/update.md
    - Remove: crud/delete.md
  - Development:
    - Testing: development/testing.md
    - Provider Scaffolding: development/provider_scaffolding.md
    - Simulators: development/simulator.md
    - Releasing: development/releasing.md
    - Versioning: development/versioning.md
  - Troubleshooting:
    - Known Errors: troubleshooting/known_errors.md
    - CSM: troubleshooting/csm/known_errors.md
  - Device Types:
    - Schema: devicetypes/devicetype.md
    - Customizing: devicetypes/customizing.md
    - Extending: devicetypes/extending.md
  # add everything else not included above.  Be careful, this is a catch all
  # currently being used to get all commands/ from auto-generated docs
  - ...
