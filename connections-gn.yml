# Connection map for Green Nitrogen spine-leaf topology
#
# x3516 is the core networking rack (spine). All racks home back to x3516.
#
# Topology layers:
#   Layer 1  — Management (1GbE):  device iLO/BMC → local MAN switch → MANB-3516
#   Layer 2  — Backbone  (100GbE): BBL rack-leaf → BBS-3516 spine → BBB-3516 super-spine
#   Layer 3  — HSN       (400G NDR): XD670 HSN → local NDR leaf/spine → cross-rack ISLs
#   Gateway  — FortiGate/F5 → backbone switches in x3516
#
# Cable color convention:
#   blue   = management
#   orange = backbone (100GbE)
#   green  = HSN intra-rack (400G NDR)
#   yellow = HSN cross-rack ISLs (400G NDR fiber)
#   red    = gateway / security appliances
#
# Usage:
#   bin/cani alpha add connections connections-gn.yml --dry-run   # preview
#   bin/cani alpha add connections connections-gn.yml             # apply
---
version: v1
cable_defaults:
  status: Connected

connections:

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 1: Management — device iLO/BMC → rack-local management switch
  # Cable: CAT6 copper (hpe-3m-cat6-stp) for intra-rack
  #        CAT5 RJ45 4.3m (hpe-cat5-rj45-4-3m-cable) for cross-rack
  # ═══════════════════════════════════════════════════════════════════════════

  # --- x3701: GPU node iLOs → MAN-3701u48 (Aruba 2930F, ports 1-4) ---
  - a: { device: "GH-3701u34", port: "iLO" }
    b: { device: "MAN-3701u48", port: "1" }
    cable: { type: hpe-3m-cat6-stp, color: blue }
  - a: { device: "GH-3701u26", port: "iLO" }
    b: { device: "MAN-3701u48", port: "2" }
    cable: { type: hpe-3m-cat6-stp, color: blue }
  - a: { device: "GH-3701u18", port: "iLO" }
    b: { device: "MAN-3701u48", port: "3" }
    cable: { type: hpe-3m-cat6-stp, color: blue }
  - a: { device: "GH-3701u10", port: "iLO" }
    b: { device: "MAN-3701u48", port: "4" }
    cable: { type: hpe-3m-cat6-stp, color: blue }

  # x3701: NDR leaf switch mgmt → MAN-3701u48 (port 6)
  - a: { device: "HSNL-3701u42", port: "mgmt0" }
    b: { device: "MAN-3701u48", port: "6" }
    cable: { type: hpe-3m-cat6-stp, color: blue }

  # --- x3702: GPU node iLOs → MAN-3702u48 (Aruba 2930F, ports 1-4) ---
  - a: { device: "GH-3702u34", port: "iLO" }
    b: { device: "MAN-3702u48", port: "1" }
    cable: { type: hpe-3m-cat6-stp, color: blue }
  - a: { device: "GH-3702u26", port: "iLO" }
    b: { device: "MAN-3702u48", port: "2" }
    cable: { type: hpe-3m-cat6-stp, color: blue }
  - a: { device: "GH-3702u18", port: "iLO" }
    b: { device: "MAN-3702u48", port: "3" }
    cable: { type: hpe-3m-cat6-stp, color: blue }
  - a: { device: "GH-3702u10", port: "iLO" }
    b: { device: "MAN-3702u48", port: "4" }
    cable: { type: hpe-3m-cat6-stp, color: blue }

  # x3702: NDR switch management → MAN-3702u48
  - a: { device: "HSNS-3702u43", port: "mgmt0" }
    b: { device: "MAN-3702u48", port: "5" }
    cable: { type: hpe-3m-cat6-stp, color: blue }
  - a: { device: "HSNL-3702u41", port: "mgmt0" }
    b: { device: "MAN-3702u48", port: "6" }
    cable: { type: hpe-3m-cat6-stp, color: blue }

  # --- x3507: DL380 iLOs → MAN-3516u48 (cross-rack, no local mgmt switch) ---
  - a: { device: "DL-3507u25", port: "iLO" }
    b: { device: "MAN-3516u48", port: "7" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "DL-3507u23", port: "iLO" }
    b: { device: "MAN-3516u48", port: "8" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }

  - a: { device: "SERV-3507u21", port: "iLO" }
    b: { device: "MAN-3516u48", port: "9" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "SERV-3507u19", port: "iLO" }
    b: { device: "MAN-3516u48", port: "10" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "SERV-3507u17", port: "iLO" }
    b: { device: "MAN-3516u48", port: "11" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "SERV-3507u15", port: "iLO" }
    b: { device: "MAN-3516u48", port: "12" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "SERV-3507u13", port: "iLO" }
    b: { device: "MAN-3516u48", port: "13" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "SERV-3507u11", port: "iLO" }
    b: { device: "MAN-3516u48", port: "14" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "SERV-3507u9", port: "iLO" }
    b: { device: "MAN-3516u48", port: "15" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "SERV-3507u7", port: "iLO" }
    b: { device: "MAN-3516u48", port: "16" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "SERV-3507u5", port: "iLO" }
    b: { device: "FORGE-3507u47M", port: "17" }
    cable: { type: hpe-3m-cat6-stp, color: blue }

  # x3507: NDR switch mgmt + UFM → MAN-3516u48
  - a: { device: "HSNS-3507u41", port: "mgmt0" }
    b: { device: "MAN-3516u48", port: "18" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "HSNL-3507u40", port: "mgmt0" }
    b: { device: "MAN-3516u48", port: "19" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }
  - a: { device: "UFM-3507", port: "mgmt0" }
    b: { device: "MAN-3516u48", port: "20" }
    cable: { type: hpe-cat5-rj45-4-3m-cable, color: blue }

  # --- x3516: FortiGate management → MAN-3516u48 ---
  - a: { device: "FORT-3516u41", port: "mgmt1" }
    b: { device: "MAN-3516u48", port: "21" }
    cable: { type: hpe-3m-cat6-stp, color: blue }

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 1b: Management uplinks — MAN switches → MANB-3516 aggregation
  # 2930F SFP+ (10G) → 8325-48Y8C SFP28 ports (backward-compatible)
  # 8325-48Y8C 100G → 8325-48Y8C 100G for x3502 (which uses 8325-48Y8C as MAN)
  # ═══════════════════════════════════════════════════════════════════════════

  # MAN-3701u48 dual-homed to two MANB switches in x3516
  - a: { device: "MAN-3701u48", port: "49" }
    b: { device: "MANB-3516u35", port: "1/1/1" }
    cable: { type: hpe-aruba-10g-sfpp-3m-dac, color: blue }
  - a: { device: "MAN-3701u48", port: "50" }
    b: { device: "MANB-3516u27", port: "1/1/1" }
    cable: { type: hpe-aruba-10g-sfpp-3m-dac, color: blue }

  # MAN-3702u48 dual-homed
  - a: { device: "MAN-3702u48", port: "49" }
    b: { device: "MANB-3516u35", port: "1/1/2" }
    cable: { type: hpe-aruba-10g-sfpp-3m-dac, color: blue }
  - a: { device: "MAN-3702u48", port: "50" }
    b: { device: "MANB-3516u27", port: "1/1/2" }
    cable: { type: hpe-aruba-10g-sfpp-3m-dac, color: blue }

  # MAN-3502u48 (8325-48Y8C) 100G uplinks → MANB-3516 100G ports
  - a: { device: "MAN-3502u48", port: "1/1/49" }
    b: { device: "MANB-3516u35", port: "1/1/49" }
    cable: { type: hpe-aruba-100g-qsfp28-15m-aoc, color: blue }
  - a: { device: "MAN-3502u48", port: "1/1/50" }
    b: { device: "MANB-3516u27", port: "1/1/49" }
    cable: { type: hpe-aruba-100g-qsfp28-15m-aoc, color: blue }

  # MAN-3508u48 dual-homed
  - a: { device: "MAN-3508u48", port: "49" }
    b: { device: "MANB-3516u26", port: "1/1/1" }
    cable: { type: hpe-aruba-10g-sfpp-3m-dac, color: blue }
  - a: { device: "MAN-3508u48", port: "50" }
    b: { device: "MANB-3516u25", port: "1/1/1" }
    cable: { type: hpe-aruba-10g-sfpp-3m-dac, color: blue }

  # MANB-3516 100G interconnects (management-backbone redundancy ring)
  - a: { device: "MANB-3516u35", port: "1/1/50" }
    b: { device: "MANB-3516u27", port: "1/1/50" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: blue }
  - a: { device: "MANB-3516u26", port: "1/1/49" }
    b: { device: "MANB-3516u25", port: "1/1/49" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: blue }

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 2: Backbone 100GbE — Leaf-Spine Fabric
  # Leaves: BBL-3701u45, BBL-3702u45, BBR-3516u47, BBR-3516u46
  # Spines: BBS-3516u39, BBS-3516u38
  # Each leaf has 2 uplinks to each spine (4 total per leaf)
  # Cross-rack uses 15m AOC; intra-rack uses 3m DAC
  # ═══════════════════════════════════════════════════════════════════════════

  # BBL-3701u45 (leaf) → BBS-3516u39 (spine-A), 2 uplinks
  - a: { device: "BBL-3701u45", port: "1/1/{1..2}" }
    b: { device: "BBS-3516u39", port: "1/1/{1..2}" }
    cable: { type: hpe-aruba-100g-qsfp28-15m-aoc, color: orange }

  # BBL-3701u45 (leaf) → BBS-3516u38 (spine-B), 2 uplinks
  - a: { device: "BBL-3701u45", port: "1/1/{3..4}" }
    b: { device: "BBS-3516u38", port: "1/1/{1..2}" }
    cable: { type: hpe-aruba-100g-qsfp28-15m-aoc, color: orange }

  # BBL-3702u45 (leaf) → BBS-3516u39 (spine-A), 2 uplinks
  - a: { device: "BBL-3702u45", port: "1/1/{1..2}" }
    b: { device: "BBS-3516u39", port: "1/1/{3..4}" }
    cable: { type: hpe-aruba-100g-qsfp28-15m-aoc, color: orange }

  # BBL-3702u45 (leaf) → BBS-3516u38 (spine-B), 2 uplinks
  - a: { device: "BBL-3702u45", port: "1/1/{3..4}" }
    b: { device: "BBS-3516u38", port: "1/1/{3..4}" }
    cable: { type: hpe-aruba-100g-qsfp28-15m-aoc, color: orange }

  # BBR-3516u47 (local leaf) → BBS spines — intra-rack DAC
  - a: { device: "BBR-3516u47", port: "1/1/{1..2}" }
    b: { device: "BBS-3516u39", port: "1/1/{5..6}" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }
  - a: { device: "BBR-3516u47", port: "1/1/{3..4}" }
    b: { device: "BBS-3516u38", port: "1/1/{5..6}" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }

  # BBR-3516u46 (local leaf) → BBS spines — intra-rack DAC
  - a: { device: "BBR-3516u46", port: "1/1/{1..2}" }
    b: { device: "BBS-3516u39", port: "1/1/{7..8}" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }
  - a: { device: "BBR-3516u46", port: "1/1/{3..4}" }
    b: { device: "BBS-3516u38", port: "1/1/{7..8}" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 2b: Backbone Spine → Super-Spine (BBB) within x3516
  # BBS connects to all 4 BBB switches for east-west traffic
  # ═══════════════════════════════════════════════════════════════════════════

  # BBS-3516u39 → all 4 BBB switches (intra-rack DAC)
  - a: { device: "BBS-3516u39", port: "1/1/25" }
    b: { device: "BBB-3516u11", port: "1/1/1" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }
  - a: { device: "BBS-3516u39", port: "1/1/26" }
    b: { device: "BBB-3516u10", port: "1/1/1" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }
  - a: { device: "BBS-3516u39", port: "1/1/27" }
    b: { device: "BBB-3516u8", port: "1/1/1" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }
  - a: { device: "BBS-3516u39", port: "1/1/28" }
    b: { device: "BBB-3516u7", port: "1/1/1" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }

  # BBS-3516u38 → all 4 BBB switches
  - a: { device: "BBS-3516u38", port: "1/1/25" }
    b: { device: "BBB-3516u11", port: "1/1/2" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }
  - a: { device: "BBS-3516u38", port: "1/1/26" }
    b: { device: "BBB-3516u10", port: "1/1/2" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }
  - a: { device: "BBS-3516u38", port: "1/1/27" }
    b: { device: "BBB-3516u8", port: "1/1/2" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }
  - a: { device: "BBS-3516u38", port: "1/1/28" }
    b: { device: "BBB-3516u7", port: "1/1/2" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: orange }

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 2c: Gateway — FortiGate/F5 → Backbone
  # FortiGate 100G QSFP28 → BBR leaf switches
  # F5 100G QSFP28 → BBS spine switches
  # ═══════════════════════════════════════════════════════════════════════════

  # FortiGate QSFP28 uplinks → backbone-rear leaf switches in x3516
  - a: { device: "FORT-3516u41", port: "port17" }
    b: { device: "BBR-3516u47", port: "1/1/25" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: red }
  - a: { device: "FORT-3516u41", port: "port18" }
    b: { device: "BBR-3516u46", port: "1/1/25" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: red }

  # F5 load balancer QSFP28 uplinks → backbone-spine switches in x3516
  - a: { device: "F5-3516", port: "15.0" }
    b: { device: "BBS-3516u39", port: "1/1/20" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: red }
  - a: { device: "F5-3516", port: "16.0" }
    b: { device: "BBS-3516u38", port: "1/1/20" }
    cable: { type: hpe-aruba-100g-qsfp28-3m-dac, color: red }

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 3: High-Speed Network (400G NDR InfiniBand)
  # Each XD670 has 8 HSN ports:
  #   HSN 0-3 → local NDR spine (HSNS) for north-south traffic
  #   HSN 4-7 → local NDR leaf  (HSNL) for east-west traffic
  # Cable: NDR OSFP DAC for intra-rack
  # ═══════════════════════════════════════════════════════════════════════════

  # --- x3701 HSN fabric (4 GPU nodes × 8 HSN ports = 32 cables) ---

  # GH-3701u34 → spine ports 1-4, leaf ports 1-4
  - a: { device: "GH-3701u34", port: "HSN {0..3}" }
    b: { device: "HSNS-3701u43", port: "{1..4}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }
  - a: { device: "GH-3701u34", port: "HSN {4..7}" }
    b: { device: "HSNL-3701u42", port: "{1..4}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }

  # GH-3701u26 → spine ports 5-8, leaf ports 5-8
  - a: { device: "GH-3701u26", port: "HSN {0..3}" }
    b: { device: "HSNS-3701u43", port: "{5..8}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }
  - a: { device: "GH-3701u26", port: "HSN {4..7}" }
    b: { device: "HSNL-3701u42", port: "{5..8}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }

  # GH-3701u18 → spine ports 9-12, leaf ports 9-12
  - a: { device: "GH-3701u18", port: "HSN {0..3}" }
    b: { device: "HSNS-3701u43", port: "{9,10,11,12}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }
  - a: { device: "GH-3701u18", port: "HSN {4..7}" }
    b: { device: "HSNL-3701u42", port: "{9,10,11,12}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }

  # GH-3701u10 → spine ports 13-16, leaf ports 13-16
  - a: { device: "GH-3701u10", port: "HSN {0..3}" }
    b: { device: "HSNS-3701u43", port: "{13..16}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }
  - a: { device: "GH-3701u10", port: "HSN {4..7}" }
    b: { device: "HSNL-3701u42", port: "{13..16}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }

  # --- x3702 HSN fabric (4 GPU nodes × 8 HSN ports = 32 cables) ---
  # NOTE: HSNL is at u41 (not u42 like x3701)

  # GH-3702u34 → spine ports 1-4, leaf ports 1-4
  - a: { device: "GH-3702u34", port: "HSN {0..3}" }
    b: { device: "HSNS-3702u43", port: "{1..4}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }
  - a: { device: "GH-3702u34", port: "HSN {4..7}" }
    b: { device: "HSNL-3702u41", port: "{1..4}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }

  # GH-3702u26 → spine ports 5-8, leaf ports 5-8
  - a: { device: "GH-3702u26", port: "HSN {0..3}" }
    b: { device: "HSNS-3702u43", port: "{5..8}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }
  - a: { device: "GH-3702u26", port: "HSN {4..7}" }
    b: { device: "HSNL-3702u41", port: "{5..8}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }

  # GH-3702u18 → spine ports 9-12, leaf ports 9-12
  - a: { device: "GH-3702u18", port: "HSN {0..3}" }
    b: { device: "HSNS-3702u43", port: "{9,10,11,12}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }
  - a: { device: "GH-3702u18", port: "HSN {4..7}" }
    b: { device: "HSNL-3702u41", port: "{9,10,11,12}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }

  # GH-3702u10 → spine ports 13-16, leaf ports 13-16
  - a: { device: "GH-3702u10", port: "HSN {0..3}" }
    b: { device: "HSNS-3702u43", port: "{13..16}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }
  - a: { device: "GH-3702u10", port: "HSN {4..7}" }
    b: { device: "HSNL-3702u41", port: "{13..16}" }
    cable: { type: hpe-ib-ndr-osfp-dac-cable, color: green }

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 3b: HSN Cross-Rack ISLs (400G NDR fiber, 15m single-mode)
  # Full-mesh spine-to-spine and leaf-to-leaf for bisection bandwidth
  # ═══════════════════════════════════════════════════════════════════════════

  # x3701 spine ↔ x3702 spine (4 ISL links)
  - a: { device: "HSNS-3701u43", port: "{33..36}" }
    b: { device: "HSNS-3702u43", port: "{33..36}" }
    cable: { type: hpe-ib-ndr-mpo-mpo-sm-15m, color: yellow, label: "ISL-S-3701-3702" }

  # x3701 spine ↔ x3507 spine (4 ISL links)
