# Connection map for Green Nitrogen spine-leaf topology
#
# x3516 is the core networking rack (spine). All racks home back to x3516.
#
# Topology layers:
#   Layer 1  — Management (1GbE):  device iLO/BMC → local MAN switch → MANB-x3516
#   Layer 2  — Backbone  (100GbE): BBL rack-leaf → BBS-x3516 spine → BBB-x3516 super-spine
#   Layer 3  — HSN       (400G NDR): XD670 HSN → local NDR leaf/spine → cross-rack ISLs
#   Gateway  — FortiGate/F5 → backbone switches in x3516
#
# Cable color convention:
#   blue   = management
#   orange = backbone (100GbE)
#   green  = HSN intra-rack (400G NDR)
#   yellow = HSN cross-rack ISLs (400G NDR fiber)
#   red    = gateway / security appliances
#
# Usage:
#   bin/cani alpha add connections connections-gn.yml --dry-run   # preview
#   bin/cani alpha add connections connections-gn.yml             # apply
---
version: v1
cable_defaults:
  status: Connected

connections:

