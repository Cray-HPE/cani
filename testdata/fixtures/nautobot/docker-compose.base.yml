---
x-nautobot-base: &nautobot-base
  image: "networktocode/nautobot:${NAUTOBOT_VERSION:-3.0}-py${PYTHON_VER:-3.12}"
  env_file:
    - "env/local.env"
    - "env/creds.env"
  tty: true

services:
  nautobot:
    depends_on:
      - "db"
      - "redis"
    <<: *nautobot-base
  celery_worker:
    entrypoint:
      - "sh"
      - "-c"  # this is to evaluate the $NAUTOBOT_LOG_LEVEL from the env
      - "nautobot-server celery worker -l $$NAUTOBOT_LOG_LEVEL --events"  ## $$ because of docker-compose
    depends_on:
      nautobot:
        condition: "service_healthy"
    healthcheck:
      interval: "30s"
      timeout: "10s"
      start_period: "30s"
      retries: 3
      test:
        [
          "CMD",
          "bash",
          "-c",
          "nautobot-server celery inspect ping --destination celery@$$HOSTNAME"  ## $$ because of docker-compose
        ]
    <<: *nautobot-base
  celery_beat:
    entrypoint:
      - "sh"
      - "-c"  # this is to evaluate the $NAUTOBOT_LOG_LEVEL from the env
      - "nautobot-server celery beat -l $$NAUTOBOT_LOG_LEVEL"  ## $$ because of docker-compose
    depends_on:
      nautobot:
        condition: "service_healthy"
    healthcheck:
      disable: true
    <<: *nautobot-base
  redis:
    image: "redis:6-alpine"
    command:
      - "sh"
      - "-c"  # this is to evaluate the $NAUTOBOT_REDIS_PASSWORD from the env
      - "redis-server --appendonly yes --requirepass $$NAUTOBOT_REDIS_PASSWORD"
    env_file:
      - "env/local.env"
      - "env/creds.env"
