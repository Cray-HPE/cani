---
services:
  nautobot:
    command: "nautobot-server runserver 0.0.0.0:8081"
    ports:
      - "8081:8081"
    volumes:
      - "./config/nautobot_config.py:/opt/nautobot/nautobot_config.py"
      - "./jobs:/opt/nautobot/jobs"
    healthcheck:
      interval: "30s"
      timeout: "10s"
      start_period: "60s"
      retries: 3
      test: ["CMD", "true"]  # Due to layering, disable: true won't work. Instead, change the test
  celery_worker:
    volumes:
      - "./config/nautobot_config.py:/opt/nautobot/nautobot_config.py"
      - "./jobs:/opt/nautobot/jobs"
